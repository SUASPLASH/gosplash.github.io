<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Go Splash Piscinas | É fácil ser feliz!</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; margin: 0; color: #333; }
        
        /* HEADER: Logotipo no canto superior esquerdo */
        header { 
            background: #0077b6; 
            padding: 10px 5%; 
            display: flex; 
            align-items: center; 
            justify-content: flex-start;
        }
        .logo-header { height: 60px; width: auto; border-radius: 50%; }

        /* BANNER PRINCIPAL / CARROSSEL */
        .hero { 
            background: #f0f8ff; 
            padding: 80px 20px; 
            text-align: center;
            border-bottom: 5px solid #00b4d8;
        }
        .hero h1 { font-size: 3em; color: #0077b6; }

        /* GRID DE IMAGENS E CONTEÚDO (Onde ficam seus banners antigos) */
        .content { max-width: 1200px; margin: 40px auto; padding: 20px; text-align: center; }
        .grid-fotos img { width: 100%; border-radius: 10px; margin-bottom: 20px; }

        /* RODAPÉ: Email de contato próximo ao CNPJ */
        footer { background: #1a1a1a; color: #fff; padding: 50px 20px; text-align: center; }
        .email-link { color: #00b4d8; text-decoration: none; font-weight: bold; }
        .cnpj { font-size: 0.8em; color: #777; margin-top: 20px; display: block; }
    </style>
</head>
<body>

    <header>
        <a href="index.html">
            <img src="Logotipo Agência de Turismo Dourado Minimalista.png" alt="Logo Go Splash" class="logo-header">
        </a>
    </header>

    <section class="hero">
        <h1>Transforme seu quintal em um paraíso</h1>
        <p>É fácil ser feliz!</p>
    </section>

    <div class="content">
        <div class="grid-fotos">
            <img src="banner1.jpg" alt="Piscina 1">
        </div>
    </div>

    <footer>
        <h3>Fale Conosco</h3>
        <p>E-mail: <a href="mailto:contato@gosplash.com.br" class="email-link">contato@gosplash.com.br</a></p>
        <p>www.gosplash.com.br</p>
        
        <hr style="width: 50px; border: 0.5px solid #333; margin: 25px auto;">
        
        <p>© 2026 Go Splash Piscinas</p>
        <span class="cnpj">CNPJ: 00.000.000/0001-00</span>
    </footer>

</body>
</html>
